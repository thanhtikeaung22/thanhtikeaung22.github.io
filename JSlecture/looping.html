<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Looping</h1>

    <script>
        // foe loop
        // for(initialize; condition; increment){

        // }


           

            for(let i=0; i<10; i++){
                 document.write(`<h3>Hello world ${i+1} </h3>`);
            }

            for(let i=0; i<3; i++){
                for(let k=0; k<=i; k++){
                    document.write(`*`);
                }
                document.write(`<br>`);
            }



            // while(condition){
            //     // code 

            //     // update 
            // }
            let number = parseInt(prompt("Enter a number"));

            while(number <100){
                document.write(`Your Number is While Loop $(number)<br>`);

                number+=10;
            }

            // do while loop 
            // do{
            //     code 
            //     update 
            // }while(condition)

            do{
                document.write(`your number is Do While loop ${number}<br>`);

                number +=20;
            }while(number<100);


    </script>
    
</body>
</html>
