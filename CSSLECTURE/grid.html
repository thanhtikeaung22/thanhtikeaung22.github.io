<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Grid Lesson</h1>

    <div class="grid">
        <div class="grid_child" style="background-color: green;">
            1
        </div>
        <div class="grid_child" style="background-color: rgb(15, 0, 128);">
            2
        </div>
        <div class="grid_child" style="background-color: rgb(124, 121, 19);">
            3
        </div>
        <div class="grid_child" style="background-color: rgb(135, 19, 92);">
            4
        </div>
        <div class="grid_child" style="background-color: rgb(121, 59, 57);">
            5
        </div>
        <div class="grid_child" style="background-color: rgb(139, 35, 244);">
            6
        </div>
        <div class="grid_child" style="background-color: rgb(57, 142, 153);">
            7
        </div>
        <div class="grid_child" style="background-color: rgb(210, 233, 34);">
            8
        </div>
        <div class="grid_child" style="background-color: rgb(120, 193, 154);">
            9
        </div>
    </div>

    <h1> Grid Row Add</h1>

    <div class="grid">
        <div style="background-color: #068920;">
            1
        </div>
        <div style="background-color: #1515d0;" class="row_add">
            2
        </div>
        <div style="background-color: #d0d015;">
            3
        </div>
        <div style="background-color: #d01515;">
            4
        </div>
        <div style="background-color: #15d015;">
            5
        </div>
        <div  style="background-color: #d015d0;">
            6
        </div>
        <div style="background-color: #06d015;">
            7
        </div>
        <div style="background-color: #d015d0;">
            8
        </div>
        <div style="background-color: #d0d015;">
            9
        </div>
    </div>

    <h1> Grid column Add</h1>

    <div class="grid">
        <div style="background-color: #068920;">
            1
        </div>
        <div style="background-color: #1515d0;" class="column_add">
            2
        </div>
        <div style="background-color: #d0d015;">
            3
        </div>
        <div style="background-color: #d01515;">
            4
        </div>
        <div style="background-color: #15d015;">
            5
        </div>
        <div  style="background-color: #d015d0;">
            6
        </div>
        <div style="background-color: #06d015;">
            7
        </div>
        <div style="background-color: #d015d0;">
            8
        </div>
        <div style="background-color: #d0d015;">
            9
        </div>
    </div>


    
</body>
</html>
