<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Heart Animation with Text</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        svg {
            display: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        
        /* --- စာသားအတွက် CSS ပြင်ဆင်ချက် --- */
        .text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            text-align: center;
            pointer-events: none; /* စာသားကြောင့် Animation ကို မောက်စ်နဲ့ ရွှေ့လို့မရတာမျိုး မဖြစ်အောင် */
            z-index: 10; /* Animation ရဲ့ အပေါ်မှာ ရှိနေစေရန် */
        }
        .text-container h1 {
            font-size: 1.5rem;
            margin: 0;
            text-shadow: 0 0 10px rgba(255, 51, 170, 0.8), 0 0 20px rgba(255, 51, 170, 0.5); /* စာသားကို ပန်းရောင် လင်းလက်ပဟေဠိပုံစံ လုပ်ထားတာ */
            letter-spacing: 2px;
            animation: pulse 2s infinite ease-in-out; /* စာသားလေး တုန်ခါပြီး အသက်ဝင်နေစေရန် */
        }
        
        /* စာသား ပိန်လိုက် ဖောင်းလိုက် ဖြစ်စေမယ့် Animation */
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="text-container">
        <h1>ကိုကိုစိုး ကို အရမ်းအရမ်း ငြင်းတယ်ဗျာ!</h1>
    </div>

    <svg viewBox="0 0 600 600">
        <path id="heart" d="M300,140 C240,40 120,40 60,140 C0,240 90,380 300,520 C510,380 600,240 540,140 C480,40 360,40 300,140 Z"/>
    </svg>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
        camera.position.z = 500;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const tl = gsap.timeline({ repeat: -1, yoyo: true });

        const path = document.querySelector("#heart");
        const length = path.getTotalLength();
        
        const geometry = new THREE.BufferGeometry();
        const positions = [];

        for (let i = 0; i < length; i += 0.2) {
            const point = path.getPointAtLength(i);
            const vector = new THREE.Vector3(point.x - 300, -point.y + 270, 0);
            
            vector.x += (Math.random() - 0.5) * 30;
            vector.y += (Math.random() - 0.5) * 30;
            vector.z += (Math.random() - 0.5) * 70;
            
            positions.push(vector.x, vector.y, vector.z);
            
            tl.from(vector, {
                x: 0,
                y: 0,
                z: 0,
                ease: "power2.inOut",
                duration: gsap.utils.random(2, 5),
                onUpdate: function() {
                    const arr = geometry.attributes.position.array;
                    const index = Math.floor(i / 0.2) * 3;
                    if(arr[index]) {
                        arr[index] = vector.x;
                        arr[index+1] = vector.y;
                        arr[index+2] = vector.z;
                        geometry.attributes.position.needsUpdate = true;
                    }
                }
            }, i * 0.002);
        }

        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        
        const material = new THREE.PointsMaterial({
            color: 0xff33aa,
            size: 3,
            transparent: true,
            opacity: 0.8
        });
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.y += 0.002; 
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
