<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="jquery-4.0.0.min.js"></script>
</head>
<body>
    <h1>jQuery is funny!</h1>
    <button id="click">Click</button>

    <p id="p-click">This is p element 1.</p>
    <p id="p-select">This is p element 2.</p>
    <p class="p-class">This is p element 3.</p>
    <h2 class="p-class">This is p element 4.</h2>
    <h3 class="p-class">This is p element 5.</h3>


    <script>
        $(document).ready(function(){

            $(`#click`).click(function(){
                $(`p`).hide(function(){
                    alert("p element is hide.");
                });
            });

            $(`#p-click`).click(function(){
                $(`.p-class`).hide();
            });

            $(`#p-select`).click(function(){
                $(this).hide();
            });

        });
    </script>
    
</body>
</html>
